        body {

        canvas {

        /* 加载画面 */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }
        #loading.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loading .ring {
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255, 180, 100, 0.18);
            border-top-color: #ff9944;
            border-radius: 50%;
            animation: spin 1.1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loading .text {
            color: rgba(255, 200, 140, 0.65);
            font-size: 12px;
            letter-spacing: 0.08em;
        }
        /* 底部提示 */
        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.35);
            font-size: 10.5px;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1.5;
            animation: fadeHint 4s ease-in-out infinite;
        }
        @keyframes fadeHint {
            0%,
            100% {
                opacity: 0.16;
            }
            50% {
                opacity: 0.55;
            }
        }
        /* 标题 */

            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;

            font-size: 13px;
            letter-spacing: 0.06em;
            text-shadow: 0 0 20px rgba(200, 120, 60, 0.5);
        }
