    <style>
        :root {

        /* 加载画面 */

            z-index: 1000;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==================== 隐藏加载画面 ====================
        const loadingScreen = document.getElementById('loading-screen');
        function hideLoading() {
            loadingScreen.classList.add('hidden');
            setTimeout(() => loadingScreen.remove(), 700);
        }

        // ==================== Toast ====================
        const toast = document.getElementById('toast');
        let toastTimer;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 全屏 ====================
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const el = document.documentElement;
                (el.requestFullscreen || el.webkitRequestFullscreen).call(el).catch(() => {});
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document).catch(() => {});
            }
        });
        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

        function updateFullscreenIcon() {
            const isFull = !!document.fullscreenElement || !!document.webkitFullscreenElement;
            fullscreenBtn.innerHTML = isFull ?
                `<svg viewBox="0 0 24 24">
                    <polyline points="4 8 4 3 9 3"></polyline>
                    <polyline points="20 16 20 21 15 21"></polyline>
                    <line x1="4" y1="3" x2="10" y2="9"></line>
                    <line x1="20" y1="21" x2="14" y2="15"></line>
                </svg>` :
                `<svg viewBox="0 0 24 24">
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <polyline points="9 21 3 21 3 15"></polyline>
                    <line x1="21" y1="3" x2="14" y2="10"></line>
                    <line x1="3" y1="21" x2="10" y2="14"></line>
                </svg>`;
        }

        // ==================== 分享 ====================
        const shareBtn = document.getElementById('share-btn');
        shareBtn.addEventListener('click', async () => {
            const url = window.location.href;
            const title = '🕳️ 黑洞模拟 - 影院级物理可视化';
            const text = '一个符合物理规律的黑洞3D模拟，包含事件视界、光子环、体积吸积盘等真实天文特征。';

            if (navigator.share && navigator.canShare && navigator.canShare({ title, text, url })) {
                try {
                    await navigator.share({ title, text, url });
                    showToast('✅ 已分享');
                } catch (e) {
                    copyToClipboard(url);
                }
            } else {
                copyToClipboard(url);
            }
        });

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast('✅ 链接已复制，可粘贴分享')).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy');
                showToast('✅ 链接已复制，可粘贴分享'); } catch (e) { showToast('⚠ 复制失败，请手动复制URL'); }
            document.body.removeChild(ta);
        }

        // ==================== 常数 ====================
        const RS = 1.0;
        const PHOTON_SPHERE = 1.5 * RS;
        const SHADOW_RADIUS = Math.sqrt(27) / 2 * RS;
        const DISK_INNER = 2.82 * RS;
        const DISK_OUTER = 8.5 * RS;

        // ==================== 渲染器 ====================
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: 'high-performance',
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = null;

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.05, 250);
        camera.position.set(6.2, 4.8, 11.5);
        camera.lookAt(0, 0.18, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.15, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2.4;
        controls.maxDistance = 38;
        controls.maxPolarAngle = Math.PI * 0.79;
        controls.minPolarAngle = 0.03;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.14;
        controls.update();

        const canvas = renderer.domElement;
        canvas.addEventListener('pointerdown', () => document.body.classList.add('grabbing'));
        canvas.addEventListener('pointerup', () => document.body.classList.remove('grabbing'));
        canvas.addEventListener('pointerleave', () => document.body.classList.remove('grabbing'));

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.55, 0.4, 0.75
        );
        composer.addPass(bloomPass);

        // ==================== 光照 ====================
        scene.add(new THREE.AmbientLight(0x020100, 0.12));
        const diskLight = new THREE.PointLight(0xff7722, 28, 30, 1.15);
        diskLight.position.set(0, 0.18, 0);
        scene.add(diskLight);
        const diskLight2 = new THREE.PointLight(0xff9944, 13, 19, 1.55);
        diskLight2.position.set(0, -0.08, 0);
        scene.add(diskLight2);
        const ringLight = new THREE.PointLight(0xffeecc, 9, 13, 1.55);
        ringLight.position.set(0, 1.05, 0);
        scene.add(ringLight);

        // ==================== 事件视界 ====================
        const hGeo = new THREE.SphereGeometry(RS, 140, 105);
        const hMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const horizon = new THREE.Mesh(hGeo, hMat);
        horizon.renderOrder = 100;
        scene.add(horizon);

        // ==================== 暗影晕 ====================
        const shGeo = new THREE.SphereGeometry(SHADOW_RADIUS * 0.978, 110, 82);
        const shMat = new THREE.ShaderMaterial({
            uniforms: {
                uInnerR: { value: RS },
                uOuterR: { value: SHADOW_RADIUS * 0.978 },
                uTime: { value: 0 },
            },
            vertexShader: /* glsl */ `
                varying vec3 vWPos; varying vec3 vWNorm;
                void main(){
                    vec4 wp=modelMatrix*vec4(position,1.0); vWPos=wp.xyz;
                    vWNorm=normalize(mat3(modelMatrix)*normal);
                    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
                }
            `,
            fragmentShader: /* glsl */ `
                varying vec3 vWPos; varying vec3 vWNorm;
                uniform float uInnerR,uOuterR,uTime;
                void main(){
                    float d=length(vWPos);
                    float t=smoothstep(uInnerR*0.85,uOuterR,d);
                    float a=(1.0-t)*0.4;
                    a*=smoothstep(uInnerR*0.77,uInnerR*1.13,d);
                    float ps=exp(-abs(d-uInnerR*1.47)*10.0)*0.065;
                    a+=ps; a=clamp(a,0.0,1.0);
                    vec3 c=mix(vec3(0),vec3(0.025,0.008,0.002),ps);
                    gl_FragColor=vec4(c,a);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending,
        });
        const shadowHalo = new THREE.Mesh(shGeo, shMat);
        shadowHalo.renderOrder = 99;
        scene.add(shadowHalo);

        // ==================== 光子环 ====================
        function photonRing(radius, tube, color, opacity, segs = 360) {
            const g = new THREE.TorusGeometry(radius, tube, 32, segs);
            const m = new THREE.MeshBasicMaterial({
                color,
                transparent: true,
                opacity,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const mesh = new THREE.Mesh(g, m);
            mesh.rotation.x = Math.PI / 2;
            mesh.renderOrder = 101;
            return mesh;
        }
        const rings = [
            photonRing(PHOTON_SPHERE, 0.014, 0xffffee, 0.95),
            photonRing(PHOTON_SPHERE, 0.048, 0xffddaa, 0.44),
            photonRing(PHOTON_SPHERE, 0.115, 0xffaa55, 0.18),
            photonRing(PHOTON_SPHERE, 0.22, 0xff8833, 0.06),
            photonRing(PHOTON_SPHERE * 0.947, 0.008, 0xfffff5, 0.62),
            photonRing(PHOTON_SPHERE * 0.893, 0.005, 0xffffff, 0.36),
            photonRing(PHOTON_SPHERE * 0.84, 0.003, 0xffffff, 0.22),
            photonRing(PHOTON_SPHERE * 1.052, 0.02, 0xffeecc, 0.28),
            photonRing(PHOTON_SPHERE * 1.085, 0.03, 0xffddaa, 0.11),
        ];
        rings.forEach(r => scene.add(r));

        // ==================== 体积吸积盘 ====================
        function createDiskLayer(innerR, outerR, thickness, colorTop, colorBot, opacity, segments = 480) {
            const geo = new THREE.RingGeometry(innerR, outerR, segments, 12);
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uCamPos: { value: new THREE.Vector3() },
                    uTime: { value: 0 },
                    uInner: { value: innerR },
                    uOuter: { value: outerR },
                    uRs: { value: RS },
                    uThickness: { value: thickness },
                    uColorTop: { value: new THREE.Color(colorTop) },
                    uColorBot: { value: new THREE.Color(colorBot) },
                    uOpacity: { value: opacity },
                },
                vertexShader: /* glsl */ `
                    varying vec3 vWPos; varying vec2 vUv; varying float vR; varying vec3 vVel; varying vec3 vLocalPos;
                    void main(){
                        vec4 wp=modelMatrix*vec4(position,1.0); vWPos=wp.xyz; vUv=uv;
                        vR=length(wp.xz); vVel=normalize(vec3(wp.z,0.0,-wp.x)); vLocalPos=position;
                        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
                    }
                `,
                fragmentShader: /* glsl */ `
                    varying vec3 vWPos; varying vec2 vUv; varying float vR; varying vec3 vVel; varying vec3 vLocalPos;
                    uniform vec3 uCamPos,uColorTop,uColorBot;
                    uniform float uTime,uInner,uOuter,uRs,uThickness,uOpacity;
                    vec3 bb(float t){
                        vec3 cool=vec3(0.74,0.15,0.022), mid=vec3(1.0,0.66,0.2), hot=vec3(0.86,0.85,1.0);
                        if(t>0.46) return mix(mid,hot,(t-0.46)/0.54);
                        else if(t>0.08) return mix(cool,mid,(t-0.08)/0.38);
                        else return cool*(0.25+0.75*t/0.08);
                    }
                    void main(){
                        float rNorm=clamp((vR-uInner)/(uOuter-uInner),0.0,1.0);
                        float temp=pow(1.0-rNorm*0.91,2.4);
                        vec3 baseCol=bb(temp);
                        float bright=0.44+0.56*(1.0-rNorm)*(1.0-rNorm);
                        vec3 toCam=normalize(uCamPos-vWPos);
                        float doppler=dot(vVel,toCam);
                        float beta=0.28+0.3*(1.0-rNorm);
                        float gamma=1.0/sqrt(1.0-beta*beta);
                        float doppF=1.0/(gamma*(1.0-beta*doppler));
                        float beam=clamp(pow(doppF,2.75),0.05,4.8);
                        vec3 dTint=mix(vec3(1.0,0.46,0.2),vec3(1.0,1.0,1.0),doppler*0.5+0.5);
                        dTint=mix(dTint,vec3(1.08,1.08,1.25),max(0.0,doppler)*0.55);
                        vec3 col=baseCol*bright*beam*dTint;

                    v.push(rr * Math.cos(a), y, rr * Math.sin(a));
                }
            }
            for (let j = 0; j < rings; j++)
                for (let i = 0; i < seg; i++) {
                    const a = j * (seg + 1) + i,
                        b = a + 1,
                        c = a + seg + 1,
                        d = c + 1;
                    idx.push(a, b, d, a, d, c);
                }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
            geo.setIndex(idx);
            geo.computeVertexNormals();

                    varying vec3 vWPos,vNorm,vVDir;

                    }
                } else {

                if (d.h > 8.5) { d.h = 1.0 + Math.random() * 1.0;
                    d.bR = 0.04 + Math.random() * 0.22;
                    d.bA = Math.random() * Math.PI * 2; }
                const r = d.bR + (Math.random() - 0.5) * 0.12;
                arr[i * 3] = r * Math.cos(d.bA);
                arr[i * 3 + 1] = d.h * yD;
                arr[i * 3 + 2] = r * Math.sin(d.bA);
            }
            j.pts.geometry.attributes.position.needsUpdate = true;
        }

        function updateHotspots(dt) {
            for (let i = 0; i < HOTSPOTS; i++) {
                const hs = hotspotData[i];
                hs.age += dt;
                if (hs.age > hs.lifetime) {
                    hs.age = 0;
                    hs.r = DISK_INNER + Math.random() * (DISK_OUTER - DISK_INNER - 1.5);
                    hs.angle = Math.random() * Math.PI * 2;
                    hs.speed = (0.45 + Math.random() * 1.1) / Math.pow(hs.r / DISK_INNER, 1.5);
                    hs.lifetime = 1.5 + Math.random() * 5;
                }
                hs.angle += hs.speed * dt;
                hs.mesh.position.set(hs.r * Math.cos(hs.angle), 0, hs.r * Math.sin(hs.angle));
                const lr = hs.age / hs.lifetime;
                const flicker = 1.0 + Math.sin(tSum * 16 + i * 3.5) * 0.28 + Math.sin(tSum * 24 + i * 1.2) * 0.16 + Math.sin(
                    tSum * 35 + i * 2.8) * 0.08;
                const fade = lr < 0.12 ? lr / 0.12 : (1.0 - (lr - 0.12) / 0.88);
                const op = Math.max(0.04, fade * flicker);
                hs.mesh.material.opacity = op * 0.88;
                hs.glowMesh.material.opacity = op * 0.36;
                hs.mesh.scale.setScalar((0.75 + 0.25 * flicker));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.12);
            tSum += dt;
            controls.update();
            const cp = camera.position;

            shMat.uniforms.uTime.value = tSum;
            cMat.uniforms.uTime.value = tSum;
            [...diskLayers, ...diskMirrorLayers].forEach(l => {
                if (l.material.uniforms) {
                    l.material.uniforms.uCamPos.value.set(cp.x, cp.y, cp.z);
                    l.material.uniforms.uTime.value = tSum;
                }
            });
            arcs.forEach(a => { if (a.material.uniforms?.uCamPos) a.material.uniforms.uCamPos.value.set(cp.x, cp.y, cp
                    .z); });

            updParticles(dt);
            updJet(jetN, 1, dt);
            updJet(jetS, -1, dt);
            updJet(jetNCore, 1, dt);
            updJet(jetSCore, -1, dt);
            updateHotspots(dt);

            const pulse = 1.0 + Math.sin(tSum * 1.7) * 0.05 + Math.sin(tSum * 4.7) * 0.028;
            rings[0].material.opacity = 0.91 * pulse;
            rings[1].material.opacity = 0.41 * pulse;
            rings[2].material.opacity = 0.17 * pulse;
            rings[3].material.opacity = 0.055 * pulse;
            rings[4].material.opacity = 0.57 * pulse;
            rings[5].material.opacity = 0.32 * pulse;
            rings[6].material.opacity = 0.2 * pulse;
            rings[7].material.opacity = 0.25 * pulse;
            rings[8].material.opacity = 0.1 * pulse;

            igRing.material.opacity = 0.76 * (1.0 + Math.sin(tSum * 2.5) * 0.085 + Math.sin(tSum * 5.8) * 0.04);
            ogRing.material.opacity = 0.16 + Math.sin(tSum * 1.9) * 0.03;
            diskLight.intensity = 26 + Math.sin(tSum * 2.1) * 2.8;
            ringLight.intensity = 7 + Math.sin(tSum * 2.4) * 0.9;
            fieldLines.forEach((l, i) => { l.rotation.y += dt * (0.025 + 0.055 * (i % 5) / 5); });

            composer.render();
        }

        // ==================== 响应式 ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'r':
                    camera.position.set(6.2, 4.8, 11.5);
                    controls.target.set(0, 0.15, 0);
                    controls.update();
                    break;
                case 'f':
                    camera.position.set(0, 13, 0.15);
                    controls.target.set(0, 0, 0);
                    controls.update();
                    break;
                case 's':
                    camera.position.set(14, 0.04, 0);
                    controls.target.set(0, 0, 0);
                    controls.update();
                    break;
                case 'a':
                    controls.autoRotate = !controls.autoRotate;
                    break;
                case '0':
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 0.14;
                    camera.position.set(6.2, 4.8, 11.5);
                    controls.target.set(0, 0.15, 0);
                    controls.update();
                    break;
                case 'b':
                    bloomPass.strength = bloomPass.strength > 0.6 ? 0.28 : 0.55;
                    showToast(bloomPass.strength > 0.5 ? '💡 泛光: 强' : '💡 泛光: 弱');
                    break;
                case 'h':
                    hotspotGroup.visible = !hotspotGroup.visible;
                    showToast(hotspotGroup.visible ? '🔥 热斑: 显示' : '🔥 热斑: 隐藏');
                    break;
                case 'm':
                    fieldLines.forEach(l => l.visible = !l.visible);
                    showToast(fieldLines[0].visible ? '🧲 磁力线: 显示' : '🧲 磁力线: 隐藏');
                    break;
            }
        });

        // 初始化盘面uniforms
        [...diskLayers, ...diskMirrorLayers].forEach(l => {
            l.material.uniforms.uCamPos.value.set(camera.position.x, camera.position.y, camera.position.z);
        });

        // 启动渲染并隐藏加载画面
        requestAnimationFrame(animate);
        // 延迟一下隐藏loading，让首帧先渲染
        setTimeout(hideLoading, 400);

        console.log('🕳️  黑洞物理模拟 - 可分享版本');
        console.log('  分享按钮在右上角 | Share button at top-right');
        console.log('  全屏按钮在右上角 | Fullscreen button at top-right');
        console.log('  ⌨ R=重置 F=俯视 S=侧面 A=自动旋转 B=泛光 H=热斑 M=磁力线');
    </script>
</body>
</html>
